  windows-x64:
    needs: prepare
    runs-on: windows-latest
    env:
      WINDFLOW_RELEASE_REF: ${{ needs.prepare.outputs.ref_name }}
      WINDFLOW_RELEASE_SHA: ${{ needs.prepare.outputs.resolved_sha }}
      WINDFLOW_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v6
        with:
          repository: feiandxs/windflow
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ needs.prepare.outputs.resolved_sha }}

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure pnpm for shorter paths
        shell: bash
        run: pnpm config set virtual-store-dir-max-length 70

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm install --frozen-lockfile

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI binary
        shell: bash
        run: |
          set -euxo pipefail
          cargo build --release -p windflow-cli --manifest-path crates/Cargo.toml
          mkdir -p apps/windflow-desktop/resources/bin
          cp crates/target/release/windflow.exe apps/windflow-desktop/resources/bin/
          ls -lh apps/windflow-desktop/resources/bin/

