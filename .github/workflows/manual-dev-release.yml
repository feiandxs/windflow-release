        shell: bash
        run: |
          set -euxo pipefail
          pnpm --filter windflow-desktop build:dev-release -- --win nsis msi --x64
          mkdir -p release
          APP_DIST="${APP_DIR}/dist"
          find "$APP_DIST" -maxdepth 1 -type f \( -name '*.exe' -o -name '*.msi' \) -exec cp {} release/ \;

