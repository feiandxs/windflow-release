          APP_DIST="${APP_DIR}/dist"
          find "$APP_DIST" -maxdepth 1 -type f \( -name '*.zip' -o -name '*.dmg' \) ! -name '*.blockmap' -exec cp {} release/ \;

      - name: Validate universal packaged sidecars
